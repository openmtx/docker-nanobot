services:
  nanobot:
    image: ghcr.io/openmtx/nanobot:latest
    volumes:
      - ./data:/data:Z
    command: ["gateway"]
    environment:
      - NANOBOT_STREAM_IDLE_TIMEOUT_S=300
      - NANOBOT_OPENAI_COMPAT_TIMEOUT_S=300
      - NANOBOT_LLM_TIMEOUT_S=300
    restart: unless-stopped
    # Uncomment the lines below on Linux to allow the container to
    # reach the host machine via host.docker.internal (e.g. for a
    # local OpenAI-compatible API running on the host).
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    ports:
      # WebUI access
      - 8765:8765
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
